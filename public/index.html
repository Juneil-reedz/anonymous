<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anonymous — Post a prompt. Get chaos back.</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A0716;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }
    .logo {
      width: 72px; height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, #7C3AED, #EC4899);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin: 0 auto 20px;
      box-shadow: 0 0 40px rgba(124,58,237,0.4);
    }
    h1 { font-size: 36px; font-weight: 900; letter-spacing: -1px; }
    p { color: #94A3B8; font-size: 17px; margin-top: 10px; line-height: 1.5; }
    .badge {
      margin-top: 24px;
      background: #1C1438;
      border: 1px solid #2D2060;
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 14px;
      color: #A78BFA;
    }
  </style>
</head>
<body>
  <div class="logo">?</div>
  <h1>Anonymous</h1>
  <p>Post a prompt.<br>Get anonymous chaos back.</p>
  <div class="badge">📱 Download the app to create your own prompt links</div>
</body>
</html>
