<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anonymous — Post a prompt. Get chaos back.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0D0904;
      color: #F5EED8;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }

    .logo {
      width: 80px; height: 80px;
      border-radius: 22px;
      overflow: hidden;
      margin: 0 auto 24px;
      box-shadow: 0 0 40px rgba(212,168,83,0.35), 0 8px 32px rgba(0,0,0,0.5);
    }

    .logo img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    h1 {
      font-size: 34px;
      font-weight: 900;
      letter-spacing: -0.8px;
      margin-bottom: 10px;
    }

    p {
      color: #8A7560;
      font-size: 16px;
      line-height: 1.55;
      max-width: 280px;
      margin: 0 auto 32px;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #D4A853, #B8892E);
      color: #1A1209;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.5px;
      padding: 14px 28px;
      border-radius: 14px;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(212,168,83,0.3);
      transition: opacity 0.15s, transform 0.1s;
    }

    .cta:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="logo"><img src="/icon.png" alt="Anonymous"></div>
  <h1>Anonymous</h1>
  <p>Post a prompt.<br>Get anonymous chaos back from your friends.</p>
  <a href="https://juneil-reedz.github.io/anonymous/" class="cta">
    Open the App →
  </a>
</body>
</html>
